version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - OLLAMA_MODEL=llama3.1:8b
      - EMBED_MODEL=nomic-embed-text
      - CHROMA_DB=./data/chroma
    # Nota: En este caso Ollama debe estar corriendo en la máquina host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000